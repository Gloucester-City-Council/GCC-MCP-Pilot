name: Deploy to Azure Function App - func-mpc-poc

# Triggers on push to main (excluding docs/workflow-only changes).
# Workflow dispatch allows manual deploys from the Actions tab.
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/**'
      - '**.md'
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_PACKAGE_PATH: '.'
  NODE_VERSION: '18.x'

# ─────────────────────────────────────────────────────────────────────────────
# Azure App Settings required for the Rendered DOM MCP (set via Azure Portal
# or az CLI — these are NOT stored in this file):
#
#   PLAYWRIGHT_BROWSERS_PATH = 0
#     Stores Chromium relative to the playwright package install rather than
#     ~/.cache/ms-playwright, keeping it inside the deployment directory.
#
#   FUNCTIONS_EXTENSION_VERSION = ~4
#   WEBSITE_RUN_FROM_PACKAGE    = 0
#     Required for scm-do-build-during-deployment to work correctly.
#
# The Azure Function App must use Linux Premium plan (EP1 or higher).
# Consumption plan does not provide sufficient memory or disk for headless
# Chromium. The Rendered DOM MCP tools return RENDER_FAILED gracefully if
# the browser is unavailable, so other MCPs are unaffected.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # CI=true is set automatically by GitHub Actions.
      # scripts/install-playwright.js detects this and skips the Chromium
      # download — test suite mocks Playwright so no real browser is needed.
      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Deploys source package to Azure (node_modules excluded via .funcignore).
      # scm-do-build-during-deployment=true triggers a Kudu remote build:
      #   1. Azure runs `npm install` on the server.
      #   2. Our postinstall script (scripts/install-playwright.js) runs.
      #   3. CI is not set in Kudu, so Chromium is downloaded.
      #   4. The function app starts with Chromium available.
      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: 'func-mpc-poc'
          slot-name: 'Production'
          package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_D6D602EA7A714F8A8B9A13B7DFD7BB4C }}
          scm-do-build-during-deployment: true
          respect-funcignore: true
